    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Obtener el ID de la URL (nueva lógica con SLUG o fallback a ID viejo)
            const urlParams = new URLSearchParams(window.location.search);
            let autoSlug = urlParams.get('auto');
            let carId;

            if (autoSlug) {
                // El ID es el último número después del guión (ej: ford-territory-4)
                const parts = autoSlug.split('-');
                carId = parseInt(parts[parts.length - 1]);
            } else {
                // Fallback por si alguien entra con un link viejo (?id=4)
                carId = parseInt(urlParams.get('id'));
            }

            // Si no hay ID (al abrir el archivo directamente), cargar el primer vehículo por defecto para poder previsualizar
            if (isNaN(carId)) {
                carId = 1;
            }

            const container = document.getElementById('car-detail-container');

            // Find the car
            const car = typeof inventoryData !== 'undefined' ? inventoryData.find(c => c.id === carId) : null;

            if (!car) {
                container.innerHTML = `
                    <div class="container mx-auto px-6 max-w-7xl text-center py-24">
                        <i class="fas fa-exclamation-triangle text-6xl text-brand-700 mb-6"></i>
                        <h1 class="text-3xl font-bold text-white mb-4">Vehículo no encontrado</h1>
                        <p class="text-gray-400 mb-8">El vehículo que buscas no existe o ha sido removido del inventario.</p>
                        <a href="index.html" class="bg-accent-500 text-white px-8 py-4 rounded-xl font-semibold hover:bg-accent-600 transition-colors inline-block">Volver al Inventario</a>
                    </div>
                `;
                return;
            }

            // Render car details
            document.title = `${car.brand} ${car.model} | Urquijo Automotores`;

            // SEO Dinámico para que Google no lo marque como duplicado
            const metaDesc = document.querySelector('meta[name="description"]');
            if(metaDesc) metaDesc.content = `Excelente ${car.brand} ${car.model} ${car.trim} del año ${car.year} con ${car.km} km. Conocé más detalles y precio en Urquijo Automotores.`;
            
            const ogTitle = document.querySelector('meta[property="og:title"]');
            if(ogTitle) ogTitle.content = `${car.brand} ${car.model} | Urquijo Automotores`;
            
            const ogDesc = document.querySelector('meta[property="og:description"]');
            if(ogDesc) ogDesc.content = `Mirá este ${car.brand} ${car.model} modelo ${car.year}. Ideal para vos, vení a verlo a General Belgrano.`;

            // URL Canónica dinámica
            let canonical = document.querySelector('link[rel="canonical"]');
            if(!canonical) {
                canonical = document.createElement('link');
                canonical.rel = 'canonical';
                document.head.appendChild(canonical);
            }
            canonical.href = `https://urquijoautomotores.github.io/detalle.html?auto=${getCarSlug(car)}`;

            // Setup Wahtsapp message
            const waMessage = encodeURIComponent(`Hola! Quisiera más información sobre el ${car.brand} ${car.model} ${car.trim} (${car.year}) publicado a ${car.price}.`);

            container.innerHTML = `
                <div class="container mx-auto px-6 max-w-7xl animate-fade-in-up">
                    <a href="index.html#inventario" class="inline-flex items-center gap-2 text-gray-400 hover:text-accent-500 font-medium mb-4 transition-colors">
                        <i class="fas fa-arrow-left"></i> Volver al inventario
                    </a>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <!-- Image Gallery Area -->
                        <div class="space-y-4">
                            <div class="relative h-[350px] md:h-[400px] rounded-3xl overflow-hidden shadow-sm group border border-gray-200 bg-white">
                                ${car.status ? `<span class="absolute top-4 left-4 z-10 ${car.available ? 'bg-accent-500' : 'bg-brand-900'} text-white text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full shadow-md">${car.status}</span>` : ''}
                                <img id="main-image" src="${car.gallery && car.gallery.length > 0 ? car.gallery[0] : car.image}" alt="${car.brand} ${car.model}" fetchpriority="high" class="w-full h-full object-cover transition-all duration-300">
                                
                                <button onclick="openLightbox()" class="absolute top-4 right-4 z-10 bg-white/90 text-brand-900 w-10 h-10 rounded-full flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-opacity hover:bg-white border border-gray-200"><i class="fas fa-expand-arrows-alt"></i></button>

                                ${car.gallery && car.gallery.length > 1 ? `
                                <button onclick="prevImage()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/90 text-brand-900 w-10 h-10 rounded-full flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-opacity hover:bg-white border border-gray-200 z-20"><i class="fas fa-chevron-left"></i></button>
                                <button onclick="nextImage()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 text-brand-900 w-10 h-10 rounded-full flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-opacity hover:bg-white border border-gray-200 z-20"><i class="fas fa-chevron-right"></i></button>
                                ` : ''}
                            </div>
                            
                            ${car.gallery && car.gallery.length > 1 ? `
                            <div class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar hide-scrollbar">
                                ${car.gallery.map((img, index) => `
                                    <button onclick="changeImage(${index})" class="relative shrink-0 w-24 h-16 rounded-xl overflow-hidden border-2 transition-all duration-300 ${index === 0 ? 'border-accent-500 opacity-100' : 'border-transparent opacity-60 hover:opacity-100'} thumbnail-btn shadow-sm">
                                        <img src="${img}" class="w-full h-full object-cover">
                                    </button>
                                `).join('')}
                            </div>
                            ` : ''}
                        </div>

                        <!-- Details Area -->
                        <div class="flex flex-col">
                            <div class="mb-4">
                                <span class="text-accent-500 font-bold uppercase tracking-wider text-xs">${car.condition}</span>
                                <h1 class="font-display text-3xl md:text-5xl font-black text-brand-900 mt-1 mb-1 leading-tight tracking-tight">
                                    ${car.brand} ${car.model} <span class="text-xl md:text-2xl text-gray-500 font-medium block mt-1">${car.trim}</span>
                                </h1>
                                <div class="text-2xl font-bold text-accent-500 mt-2">${car.price}</div>
                            </div>

                            <p class="text-gray-600 text-sm leading-relaxed mb-6">
                                ${car.description || 'Vehículo en excelentes condiciones, revisado rigurosamente por nuestros especialistas para garantizar la máxima calidad.'}
                            </p>

                            <!-- Quick Stats -->
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">
                                <div class="bg-white border border-gray-100 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-md transition-shadow">
                                    <div class="w-10 h-10 bg-brand-50 rounded-full flex items-center justify-center mb-2">
                                        <i class="fas fa-calendar-alt text-brand-900"></i>
                                    </div>
                                    <span class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Año</span>
                                    <span class="font-bold text-brand-900 mt-0.5">${car.year}</span>
                                </div>
                                <div class="bg-white border border-gray-100 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-md transition-shadow">
                                    <div class="w-10 h-10 bg-brand-50 rounded-full flex items-center justify-center mb-2">
                                        <i class="fas fa-road text-brand-900"></i>
                                    </div>
                                    <span class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Kilometros</span>
                                    <span class="font-bold text-brand-900 mt-0.5">${car.km}</span>
                                </div>
                                <div class="bg-white border border-gray-100 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-md transition-shadow">
                                    <div class="w-10 h-10 bg-brand-50 rounded-full flex items-center justify-center mb-2">
                                        <i class="fas fa-gas-pump ${car.fuel === 'Híbrido' ? 'text-accent-500' : 'text-brand-900'}"></i>
                                    </div>
                                    <span class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Combustible</span>
                                    <span class="font-bold text-brand-900 mt-0.5">${car.fuel}</span>
                                </div>
                            </div>

                            <!-- Features -->
                            <div class="mb-8">
                                <h3 class="font-display text-lg font-bold text-brand-900 mb-3 border-b border-gray-100 pb-2">Equipamiento Destacado</h3>
                                <ul class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm text-gray-600">
                                    ${car.features && car.features.length > 0 ? car.features.map(f => `<li class="flex items-center gap-2"><i class="fas fa-check text-accent-500 text-xs"></i> ${f}</li>`).join('') : '<li class="italic text-gray-400">Consultar por equipamiento específico</li>'}
                                </ul>
                            </div>

                            <!-- CTA -->
                            <div class="mt-auto">
                                <a href="https://wa.me/5492241692356?text=${waMessage}" target="_blank" class="w-full bg-accent-500 text-white font-bold py-3.5 px-6 rounded-xl hover:bg-accent-600 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-accent-500/20 hover:-translate-y-1">
                                    <i class="fab fa-whatsapp text-xl"></i> Consultar por WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Configurar lógica del carrusel después de inyectar el HTML
            if (car.gallery && car.gallery.length > 1) {
                window.currentGallery = car.gallery;
                window.currentImageIndex = 0;

                window.changeImage = function (index) {
                    window.currentImageIndex = index;
                    const mainImg = document.getElementById('main-image');
                    mainImg.style.opacity = '0.4';

                    setTimeout(() => {
                        mainImg.src = window.currentGallery[index];
                        mainImg.style.opacity = '1';
                    }, 150);

                    // Actualizar thumbnails
                    document.querySelectorAll('.thumbnail-btn').forEach((btn, i) => {
                        if (i === index) {
                            btn.classList.add('border-accent-500', 'opacity-100');
                            btn.classList.remove('border-transparent', 'opacity-60');
                        } else {
                            btn.classList.remove('border-accent-500', 'opacity-100');
                            btn.classList.add('border-transparent', 'opacity-60');
                        }
                    });
                };

                window.prevImage = function () {
                    if (!window.currentGallery) return;
                    let newIndex = window.currentImageIndex - 1;
                    if (newIndex < 0) newIndex = window.currentGallery.length - 1;
                    window.changeImage(newIndex);
                };

                window.nextImage = function () {
                    if (!window.currentGallery) return;
                    let newIndex = window.currentImageIndex + 1;
                    if (newIndex >= window.currentGallery.length) newIndex = 0;
                    window.changeImage(newIndex);
                };
            }
        });

        // Lightbox functions
        function openLightbox() {
            const modal = document.getElementById('lightbox-modal');
            const lightboxImg = document.getElementById('lightbox-img');
            const mainImg = document.getElementById('main-image');

            if (!mainImg) return;

            lightboxImg.src = mainImg.src;

            // Show/hide navigation arrows
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');
            if (window.currentGallery && window.currentGallery.length > 1) {
                if (prevBtn) prevBtn.classList.remove('hidden');
                if (nextBtn) nextBtn.classList.remove('hidden');
            } else {
                if (prevBtn) prevBtn.classList.add('hidden');
                if (nextBtn) nextBtn.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            // Force reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            lightboxImg.classList.remove('scale-95');
            lightboxImg.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const modal = document.getElementById('lightbox-modal');
            const lightboxImg = document.getElementById('lightbox-img');

            modal.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        function prevLightboxImage(e) {
            if (e) e.stopPropagation();
            if (window.prevImage && window.currentGallery) {
                window.prevImage();
                document.getElementById('lightbox-img').src = window.currentGallery[window.currentImageIndex];
            }
        }

        function nextLightboxImage(e) {
            if (e) e.stopPropagation();
            if (window.nextImage && window.currentGallery) {
                window.nextImage();
                document.getElementById('lightbox-img').src = window.currentGallery[window.currentImageIndex];
            }
        }
    </script>
</body>

</html>
